<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Максим Кожейкин — ZephyrLAB</title>
<meta name="description" content="СберПраво: редизайн меню и «Заказов», главный лендинг, путь юзера, макеты. Кейсы продукт-дизайнера Максима Кожейкина.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@view-transition{navigation:auto}
::view-transition-old(main-col){animation:fOut .16s ease both}
::view-transition-new(main-col){animation:fIn .22s ease both}
@keyframes fOut{to{opacity:0;transform:translateY(-4px)}}
@keyframes fIn{from{opacity:0;transform:translateY(6px)}}

:root{
  --bg:#FCFCFD; --surface:#FFFFFF; --ink:#131316; --muted:#6C6C74; --faint:#9A9AA2;
  --line:#EBEBEF; --panel:#F4F4F7; --accent:#F0523C; --sel:#F1F1F4;
  /* ТИПОГРАФИЧЕСКАЯ ШКАЛА — 5 ступеней, других размеров в проекте нет
     --h1  Заголовок раздела:  «Кабинет врача», «Приложение SmartMed»
     --h2  Заголовок кейса:    «Расписание», «Главный экран»
           Заголовок страницы: «Lead UX/UI Designer · Medsi Digital»
     --h3  Подзаголовок:       «Проблемы», «Результат»
     --text  Основной текст:   пункты списков, описания, обязанности
     --small Вторичный текст:  чипы, подписи, навигация, мета
     --eyebrow Надзаголовок:   «КЕЙС 05», рубрики, метки  */
  --h1:clamp(2rem,3.4vw,2.9rem);
  --h2:clamp(1.6rem,2.2vw,2rem);
  --h3:1.02rem;
  --text:.98rem;
  --small:.88rem;
  --eyebrow:.72rem;
  --sans:"Golos Text",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --sidebar-w:clamp(300px,40vw,560px);
  --pad:clamp(20px,3vw,40px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px}

/* ============================================================
   КОМПОНЕНТЫ — переиспользуются везде. Новых не заводим.
   .row   — строка списка (проекты, образование, портфолио)
   .card  — карточка (проблемы, решения, цели, результаты)
   .shot  — плейсхолдер изображения
   .chip  — тег
============================================================ */
.list{display:flex;flex-direction:column}
.row{display:flex;gap:12px;align-items:baseline;padding:11px 2px;border-top:1px solid var(--line);
  transition:padding-left .18s,color .18s}
.list > .row:last-child,.list > a.row:last-of-type{border-bottom:1px solid var(--line)}
a.row:hover{padding-left:7px}
a.row:hover .row-ti{color:var(--accent)}
.row-yr{flex:0 0 82px;font-size:var(--small);color:var(--faint);font-variant-numeric:tabular-nums}
.row-ti{font-size:var(--text);line-height:1.4}
.row-arr{margin-left:auto;color:var(--faint);font-size:var(--text);line-height:1;align-self:center;transition:transform .2s,color .2s}
a.row:hover .row-arr{transform:translateX(3px)}
a.row[aria-current="page"] .row-arr{transform:rotate(90deg)}
a.row[aria-current="page"] .row-ti{color:var(--accent);font-weight:600}
a.row[aria-current="page"] .row-arr{color:var(--accent)}

.subnav{display:flex;flex-direction:column;padding:4px 0 10px 94px;gap:2px}
.subnav a{color:var(--muted);font-size:var(--small);transition:color .15s,padding-left .15s}
.subnav a:hover{color:var(--accent);padding-left:4px}
.subnav a.active{color:var(--accent);font-weight:600}

/* разделы — тихие рубрики (eyebrow, уже есть в системе), кейсы — основной текст */
.subnav a.grp{color:var(--muted);font-size:var(--small)}
.subnav a.grp:hover{color:var(--accent)}
.subnav a.cs{display:flex;gap:8px;align-items:baseline;color:var(--faint);font-size:var(--small)}
.subnav a.cs:hover{color:var(--accent)}
.subnav a.cs .n{flex:0 0 16px;color:inherit;font-variant-numeric:tabular-nums;font-size:var(--small)}
.subnav a.active{color:var(--accent)}


.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px}
.card h3{font-weight:600;font-size:var(--h3);margin-bottom:9px}
.card p{color:var(--muted);font-size:var(--text)}
/* метрика — только цифра и подпись, разделение воздухом */
.card.metric{background:none;border:none;border-radius:0;padding:0;text-align:left}
.cols:has(.card.metric){grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px 40px;margin-top:20px}
.card.metric .num{display:inline;font-weight:600;font-size:var(--text);color:var(--ink)}
.card.metric .lbl{display:inline;color:var(--ink);font-size:var(--text);font-weight:600;line-height:1.5}
.card.metric .desc{display:none}
.cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:20px}
/* пункты внутри кейса */
.points{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:16px;max-width:64ch}
.points li{position:relative;padding-left:20px;color:var(--ink);font-size:var(--text)}
.points li::before{content:"✦";position:absolute;left:0;top:0;color:var(--accent);font-size:.85rem;line-height:1.55}
.points li b{color:var(--ink);font-weight:600}

.shot{border:1px solid var(--line);border-radius:14px;aspect-ratio:16/9;background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:var(--small);text-align:center;padding:20px}
.shots{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:20px}
.caption{color:var(--muted);font-size:var(--small);margin-top:10px}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:var(--small);color:var(--muted)}
.jtbd{font-size:var(--small);color:var(--muted);margin-bottom:12px}
.jtbd b{color:var(--ink);font-weight:600}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:24px}
.gallery .shot{aspect-ratio:3/4}


/* шапка страницы = блок опыта с главной (переиспользуем) */
.exp-eyebrow{font-size:var(--small);color:var(--faint);font-variant-numeric:tabular-nums}
.exp-role{font-weight:700;font-size:var(--h1);line-height:1.2;margin-top:6px;letter-spacing:-.02em}
.exp-company{color:var(--accent)}
.exp-summary{margin-top:10px;color:var(--muted)}
/* обязанности: видны сразу, подрезаны, раскрываются кнопкой */
.duties{position:relative;overflow:hidden;max-height:170px;transition:max-height .35s ease;margin-top:16px}
.duties.open{max-height:none}
.duties::after{content:"";position:absolute;left:0;right:0;bottom:0;height:64px;
  background:linear-gradient(to bottom,rgba(252,252,253,0),var(--bg));pointer-events:none;transition:opacity .25s}
.duties.open::after{opacity:0}
.duties-more{margin-top:10px;display:inline-flex;align-items:center;gap:7px;color:var(--accent);font-weight:500;font-size:var(--small)}
.duties-more .chev{transition:transform .2s}
.duties-more:hover .chev{transform:translateY(2px)}
.duties-more.hidden{display:none}
/* дайджест достижений */
.achievements{margin-top:clamp(36px,5vh,52px)}
.section-head{font-size:var(--eyebrow);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:16px}
/* шапка отделена от кейсов */
.head-sep{margin:100px 0;height:4px;background:var(--accent);border-radius:2px}
.duties-inner{padding-top:0}
.duties ul{list-style:none;display:flex;flex-direction:column;gap:9px;max-width:62ch}
.duties li{position:relative;padding-left:18px;color:var(--ink);font-size:var(--text)}
.duties li::before{content:"✦";position:absolute;left:0;top:0;color:var(--accent);font-size:.85rem;line-height:1.55}
/* пункт-подзаголовок (целиком жирный) — без маркера */
.duties li:has(> b:only-child){padding-left:0;color:var(--ink);font-weight:600;margin-top:10px}
.duties li:has(> b:only-child)::before{display:none}


.side-bottom{margin-top:auto;display:flex;flex-direction:column;gap:18px}
.side-links{display:flex;flex-direction:row;flex-wrap:wrap;gap:14px;font-size:var(--text)}
.side-links a{color:var(--accent);width:fit-content;transition:opacity .15s}
.side-links a:hover{opacity:.65}
.side-tabs{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.segmented{display:flex;gap:2px;background:var(--sel);padding:3px;border-radius:10px}
.segmented button{padding:6px 11px;border-radius:7px;font-weight:500;font-size:var(--eyebrow);color:var(--muted);white-space:nowrap;transition:background .18s,color .18s}
.segmented button[aria-pressed="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(20,20,25,.06)}
.lang{display:inline-flex;gap:2px;font-size:var(--eyebrow);font-weight:500;background:var(--sel);padding:3px;border-radius:10px}
.lang button{padding:6px 11px;border-radius:7px;color:var(--faint)}
.lang button[aria-pressed="true"]{color:var(--ink);background:var(--surface);box-shadow:0 1px 2px rgba(20,20,25,.06)}

.shell{display:flex;min-height:100vh}
.sidebar{view-transition-name:side-col;width:var(--sidebar-w);flex:0 0 var(--sidebar-w);position:sticky;top:0;align-self:flex-start;
  height:100vh;overflow-y:auto;padding:var(--pad);padding-right:clamp(48px,9vw,170px);display:flex;flex-direction:column;gap:24px;background:var(--bg)}
.main{view-transition-name:main-col;flex:1 1 auto;min-width:0;padding:var(--pad);padding-left:clamp(32px,4vw,80px)}
.main-inner{max-width:820px}

.back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-weight:500;font-size:var(--small)}
.back:hover{color:var(--accent)}




/* блок = один раздел */
/* кейс — без подложки, разделение воздухом */
.block{margin-top:120px;scroll-margin-top:20px}
.block:first-of-type{margin-top:0}
.block-num{font-size:var(--eyebrow);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600}
.block-title{font-weight:700;font-size:var(--h2);letter-spacing:-.02em;margin-top:8px;line-height:1.2}
.block-lead{color:var(--muted);margin-top:10px;max-width:60ch}

.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px 26px;margin-top:24px;padding:22px 0;border-top:1px solid rgba(19,19,22,.08);border-bottom:1px solid rgba(19,19,22,.08)}
.meta h4{font-size:var(--eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:7px}
.meta p{font-size:var(--small)}
.meta .dim{color:var(--muted)}
.goal{display:inline-flex;align-items:center;gap:5px;background:var(--accent-weak);color:var(--accent);font-weight:600;font-size:var(--small);padding:3px 9px;border-radius:20px;margin-top:4px}

.sub{margin-top:16px}                 /* внутреннее: подсекция под заголовком */
.sub + .sub{margin-top:40px}          /* внешнее: между подсекциями */
.sub > *:first-child{margin-top:0}    /* первый элемент подсекции не отрывается */
.sub > .points:first-child{margin-top:0}  /* список сразу под заголовком блока */
.sub-title{font-weight:700;font-size:var(--h3);letter-spacing:-.01em}
.sub-title ~ .points,.sub-title ~ .sub-note{margin-top:12px}
.sub-note{color:var(--ink);margin-top:0;max-width:56ch;font-size:var(--text)}

.jtbd{font-size:var(--small);color:var(--muted);margin-bottom:12px}
.jtbd b{color:var(--ink);font-weight:600}




.foot{margin-top:80px;padding:32px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.foot a{color:var(--accent);font-weight:500;font-size:var(--small)}



.topbar{display:none}
@media (max-width:900px){
  .shell{flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;padding:14px var(--pad);background:var(--bg);border-bottom:1px solid var(--line)}
  .burger{width:40px;height:40px;border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center}
  .burger span{width:18px;height:2px;background:var(--ink);border-radius:2px}
  .sidebar{position:fixed;inset:0 0 0 auto;width:min(88vw,340px);z-index:50;transform:translateX(100%);transition:transform .28s ease;box-shadow:-20px 0 60px rgba(20,20,25,.08)}
  body.nav-open .sidebar{transform:translateX(0)}
  .scrim{position:fixed;inset:0;background:rgba(20,20,25,.3);opacity:0;pointer-events:none;transition:.28s;z-index:45}
  body.nav-open .scrim{opacity:1;pointer-events:auto}
}
@media (min-width:901px){.scrim{display:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

/* ===== CRM editor ===== */
#crmToggle{position:fixed;right:16px;bottom:16px;z-index:9998;background:var(--accent,#f0523c);color:#fff;border:none;border-radius:24px;padding:11px 17px;font:600 14px/1 system-ui,sans-serif;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.22)}
#crmToggle:hover{opacity:.92}
#crmPanel{position:fixed;top:0;right:0;width:min(430px,94vw);height:100vh;z-index:9999;background:#fff;border-left:1px solid #e4e4e8;box-shadow:-10px 0 40px rgba(0,0,0,.14);display:flex;flex-direction:column;transform:translateX(101%);transition:transform .22s ease;font:14px/1.45 system-ui,-apple-system,sans-serif;color:#1b1b1f}
#crmPanel.open{transform:none}
#crmPanel *{box-sizing:border-box}
.crm-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid #eee;flex:0 0 auto}
.crm-head b{font-size:15px}
.crm-badge{font-size:11px;background:#f1f1f3;border-radius:6px;padding:3px 7px;color:#666}
.crm-head .sp{margin-left:auto}
.crm-btn{border:1px solid #d8d8dd;background:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font:inherit;font-size:13px;color:#1b1b1f}
.crm-btn:hover{background:#f6f6f8}
.crm-btn.primary{background:var(--accent,#f0523c);color:#fff;border-color:transparent}
.crm-btn.mini{padding:2px 7px;font-size:12px;line-height:1.7}
.crm-body{overflow:auto;padding:12px;flex:1 1 auto}
.crm-block{border:1px solid #e6e6ea;border-radius:10px;padding:10px 10px 8px;margin-bottom:12px;background:#fafafb}
.crm-block.group{border-color:var(--accent,#f0523c);background:#fff7f5}
.crm-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.crm-row .tag{font-size:10px;color:#9a9aa2;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.crm-row .sp{margin-left:auto;display:flex;gap:4px}
#crmPanel label{display:block;font-size:11px;color:#8a8a92;margin:8px 0 3px}
#crmPanel input[type=text],#crmPanel textarea{width:100%;border:1px solid #d8d8dd;border-radius:7px;padding:7px 8px;font:inherit;font-size:13px;background:#fff;color:#1b1b1f}
#crmPanel input[type=text]:focus,#crmPanel textarea:focus{outline:none;border-color:var(--accent,#f0523c)}
#crmPanel textarea{resize:vertical;min-height:54px}
.crm-sub{border:1px dashed #d5d5db;border-radius:8px;padding:8px;margin:8px 0;background:#fff}
.crm-item{border:1px solid #ececf0;border-radius:7px;padding:6px 7px;margin:5px 0;background:#fafafb}
.crm-chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#555;margin:2px 12px 2px 0}
.crm-add{border:1px dashed #c9c9d0;background:#fff;border-radius:8px;padding:7px;width:100%;cursor:pointer;color:#666;font:inherit;font-size:13px;margin-top:6px}
.crm-add:hover{border-color:var(--accent,#f0523c);color:var(--accent,#f0523c)}
.crm-foot{border-top:1px solid #eee;padding:10px 14px;display:flex;flex-direction:column;gap:8px;flex:0 0 auto}
.crm-foot .r{display:flex;gap:8px}
.crm-hint{font-size:11px;color:#9a9aa2;line-height:1.35}
.crm-thumb{max-width:100%;max-height:120px;border-radius:6px;border:1px solid #eee;margin-top:6px;display:block;object-fit:contain;background:#f4f4f6}
</style>
</head>

/* ============================================================
   ТИПОГРАФИКА: убираем висячие предлоги.
   Текст не меняется — только пробел после коротких слов
   становится неразрывным, чтобы они не висели в конце строки.
============================================================ */
const SHORT_WORDS = [
  // предлоги
  "в","во","на","за","к","ко","с","со","о","об","обо","от","ото","по","до","из","изо",
  "у","для","при","про","над","под","без","перед","через","между","около","среди","после",
  // союзы и частицы
  "и","а","но","ни","не","же","ли","бы","то","что","как","чтобы","или","либо","если","так",
  // местоимения
  "я","мы","он","она","оно","они","их","его","её","мой","моя","моё","наш","эта","это","этот","все","всё",
  // англ.
  "a","an","the","in","on","at","to","of","for","and","or","with","by","from","as","is","are","was","we","i","it","my","our"
];

function fixOrphans(root){
  if(!root) return;
  const re = new RegExp("(^|[\\s(«\"„—–-])(" + SHORT_WORDS.join("|") + ")\\s+", "gi");
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n=>{
    let t = n.nodeValue;
    if(!t || !t.trim()) return;
    // короткие слова склеиваем со следующим
    let prev;
    do { prev = t; t = t.replace(re, (m,a,w)=> a + w + "\u00A0"); } while(t !== prev);
    // тире не должно начинать строку
    t = t.replace(/\s+([—–])\s/g, "\u00A0$1 ");
    // разряды в числах не рвутся: 10 000
    t = t.replace(/(\d)\s(?=\d{3}\b)/g, "$1\u00A0");
    if(t !== n.nodeValue) n.nodeValue = t;
  });
}

let spy;
function initSpy(){
  if(spy) spy.disconnect();
  const links=[...document.querySelectorAll('.projects a[aria-current="page"] ~ .subnav a, .subnav a')];

    es.forEach(e=>{

        links.forEach(l=>l.classList.toggle("active", l.getAttribute("href")==="#"+e.target.id));
    });
  },{rootMargin:"-15% 0px -75% 0px"});
  document.querySelectorAll("section.block, #overview").forEach(s=>spy.observe(s));
}

  const brToNl = s => (s==null?"":String(s)).replace(/<br\s*\/?>/gi,"\n");

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "case-" + CURRENT + ".html";
      document.body.appendChild(a); a.click(); a.remove();

  /* ---------- text input ---------- */
  function onInput(e){
    const el = e.target;
    if(el.tagName!=="INPUT" && el.tagName!=="TEXTAREA") return;
    if(el.type==="checkbox") return;
    const bi = +el.dataset.bi; if(isNaN(bi)) return;
    const field = el.dataset.field; if(!field) return;
    const kind = el.dataset.kind;
    let val = el.value;
    if(kind==="note") val = nlToBr(val);
    const b = B()[bi];
    const si = el.dataset.si!=null && el.dataset.si!=="" ? +el.dataset.si : null;
    const ci = el.dataset.ci!=null && el.dataset.ci!=="" ? +el.dataset.ci : null;
    if(si==null){ b[field]=val; }
    else {
      const s = b.subs[si];
      if(kind==="card") s.cards[ci][field]=val;
      else if(kind==="res") s.results[ci][field]=val;
      else if(kind==="img"){ s.imgs[ci][field]=val; if(field==="src"){ const t=el.parentElement.querySelector(".crm-thumb"); if(t){ t.src=val; t.style.opacity=1; } } }
      else s[field]=val;
    }
    touchSoft();
  }

  /* ---------- structural actions ---------- */
  function onClick(e){
    const el = e.target.closest("[data-act]"); if(!el) return;
    const act = el.dataset.act;
    const bi = el.dataset.bi!=null && el.dataset.bi!=="" ? +el.dataset.bi : null;
    const si = el.dataset.si!=null && el.dataset.si!=="" ? +el.dataset.si : null;
    const ci = el.dataset.ci!=null && el.dataset.ci!=="" ? +el.dataset.ci : null;
    const arr = B();
    const b = bi!=null ? arr[bi] : null;
    const s = (b && si!=null) ? b.subs[si] : null;
    const swap=(a,i,j)=>{ if(j<0||j>=a.length)return; const t=a[i];a[i]=a[j];a[j]=t; };
    switch(act){
      case "blk-up": swap(arr,bi,bi-1); break;
      case "blk-down": swap(arr,bi,bi+1); break;
      case "blk-del": if(!confirm("Удалить блок целиком?"))return; arr.splice(bi,1); break;
      case "blk-dup": arr.splice(bi+1,0,JSON.parse(JSON.stringify(b))); break;
      case "blk-add": arr.push({title:"Новый блок",lead:"",subs:[{ti:"",note:"Текст…"}]}); break;
      case "chk-group": b.group=el.checked; break;
      case "sub-up": swap(b.subs,si,si-1); break;
      case "sub-down": swap(b.subs,si,si+1); break;
      case "sub-del": if(!confirm("Удалить подблок?"))return; b.subs.splice(si,1); break;
      case "sub-add": (b.subs=b.subs||[]).push({ti:"",note:"Текст…"}); break;
      case "chk-full": s.full=el.checked; break;
      case "chk-mark": if(el.checked)s.mark="cross"; else delete s.mark; break;
      case "card-add": (s.cards=s.cards||[]).push({h:"",p:"Новый пункт"}); break;
      case "card-del": s.cards.splice(ci,1); break;
      case "res-add": (s.results=s.results||[]).push({from:"",n:"0",suf:"",l:"Подпись"}); break;
      case "res-del": s.results.splice(ci,1); break;
      case "img-add": (s.imgs=s.imgs||[]).push({src:"",cap:""}); break;
      case "img-del": s.imgs.splice(ci,1); break;
      case "img-up": uploadImg(bi,si,ci); return;
      default: return;
    }
    touchNow();
  }

  /* ---------- image upload ---------- */
  let fileInput;
  function uploadImg(bi,si,ci){
    if(!fileInput){ fileInput=document.createElement("input"); fileInput.type="file"; fileInput.accept="image/*"; fileInput.style.display="none"; document.body.appendChild(fileInput); }
    fileInput.onchange=()=>{
      const f=fileInput.files[0]; if(!f){return;}
      const r=new FileReader();
      r.onload=()=>{ B()[bi].subs[si].imgs[ci].src=r.result; touchNow(); };
      r.readAsDataURL(f);
      fileInput.value="";
    };
    fileInput.click();
  }

  /* ---------- panel + toggle ---------- */
  function openPanel(){ buildPanel(); document.getElementById("crmPanel").classList.add("open"); }
  function closePanel(){ document.getElementById("crmPanel").classList.remove("open"); }

  function build(){
    const tgl=document.createElement("button"); tgl.id="crmToggle"; tgl.textContent="✎ Редактор";
    tgl.addEventListener("click", openPanel); document.body.appendChild(tgl);

    const p=document.createElement("div"); p.id="crmPanel";
    p.innerHTML =
      `<div class="crm-head"><b>Редактор</b> <span class="crm-badge" id="crmLoc"></span>`
      + `<span class="sp"></span><button class="crm-btn mini" id="crmClose">✕</button></div>`
      + `<div class="crm-body" id="crmBody"></div>`
      + `<div class="crm-foot"><div class="r">`
      + `<button class="crm-btn primary" id="crmExport">⬇ Экспорт HTML</button>`
      + `<button class="crm-btn" id="crmReset">Сброс</button></div>`
      + `<div class="crm-hint">Правки сохраняются в браузере. «Экспорт HTML» скачает готовый файл — положи его вместо текущего и запушь. Загруженные картинки встраиваются в файл (лучше класть в assets/ и указывать путь).</div></div>`;
    document.body.appendChild(p);

    document.getElementById("crmClose").addEventListener("click", closePanel);
    document.getElementById("crmExport").addEventListener("click", exportFile);
    document.getElementById("crmReset").addEventListener("click", ()=>{ if(confirm("Сбросить все правки к исходным?")) resetAll(); });
    const body=document.getElementById("crmBody");
    body.addEventListener("input", onInput);
    body.addEventListener("click", onClick);
    // refresh panel when language toggled
    document.querySelectorAll("[data-lang-btn]").forEach(bn=>bn.addEventListener("click", ()=>{
      if(document.getElementById("crmPanel").classList.contains("open")) setTimeout(buildPanel,0);
    }));
  }

  /* ---------- init ---------- */
  const REQ = location.search.indexOf("crm")>=0 || location.hash==="#crm";
  if(!REQ) return;
  loadSaved();
  try{
    const cEl=document.getElementById("content"), nEl=document.getElementById("projects");
    const c=cEl?cEl.innerHTML:"", n=nEl?nEl.innerHTML:"";
    if(cEl)cEl.innerHTML=""; if(nEl)nEl.innerHTML="";
    ORIGINAL_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    if(cEl)cEl.innerHTML=c; if(nEl)nEl.innerHTML=n;
  }catch(e){ ORIGINAL_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML; }
  preview();
  build();
})();
</script>
</body>
</html>
