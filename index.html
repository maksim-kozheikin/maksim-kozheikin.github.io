<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Максим Кожейкин — Продукт-дизайнер</title>
<meta name="description" content="Максим Кожейкин — продукт-дизайнер. 7+ лет в FinTech и MedTech. Проектирую продукты и выстраиваю дизайн-команды.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* бесшовные переходы между отдельными страницами */
@view-transition{navigation:auto}
::view-transition-old(main-col){animation:fOut .16s ease both}
::view-transition-new(main-col){animation:fIn .22s ease both}
@keyframes fOut{to{opacity:0;transform:translateY(-4px)}}
@keyframes fIn{from{opacity:0;transform:translateY(6px)}}

:root{
  --bg:#FCFCFD; --surface:#FFFFFF; --ink:#131316; --muted:#6C6C74; --faint:#9A9AA2;
  --line:#EBEBEF; --accent:#F0523C; --sel:#F1F1F4;
  /* типографическая шкала — единая на весь сайт */
  --h1:clamp(1.35rem,1.8vw,1.65rem);   /* имя, лид, заголовок раздела, CV */
  --h2:clamp(1.1rem,1.5vw,1.3rem);     /* позиция·компания, подзаголовок */
  --h3:.98rem;                          /* заголовок карточки */
  --eyebrow:.72rem;                     /* надзаголовки, мета */
  --sans:"Golos Text",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --sidebar-w:clamp(300px,40vw,560px);
  --pad:clamp(20px,3vw,40px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px}


/* ============================================================
   КОМПОНЕНТЫ — переиспользуются везде. Новых не заводим.
   .row   — строка списка (проекты, образование, портфолио)
   .card  — карточка (проблемы, решения, цели, результаты)
   .shot  — плейсхолдер изображения
   .chip  — тег
============================================================ */
.list{display:flex;flex-direction:column}
.row{display:flex;gap:12px;align-items:baseline;padding:11px 2px;border-top:1px solid var(--line);
  transition:padding-left .18s,color .18s}
.list > .row:last-child,.list > a.row:last-of-type{border-bottom:1px solid var(--line)}
a.row:hover{padding-left:7px}
a.row:hover .row-ti{color:var(--accent)}
.row-yr{flex:0 0 82px;font-size:.82rem;color:var(--faint);font-variant-numeric:tabular-nums}
.row-ti{font-size:.95rem;line-height:1.4}
.row-arr{margin-left:auto;color:var(--faint);font-size:1rem;line-height:1;align-self:center;transition:transform .2s,color .2s}
.chip-tag ~ .row-arr{margin-left:10px}
a.row:hover .row-arr{transform:translateX(3px)}
a.row[aria-current="page"] .row-arr{transform:rotate(90deg)}
a.row[aria-current="page"] .row-ti{color:var(--accent);font-weight:600}
a.row[aria-current="page"] .row-arr{color:var(--accent)}

.subnav{display:flex;flex-direction:column;padding:4px 0 10px 94px;gap:2px}
.subnav a{color:var(--muted);font-size:.88rem;transition:color .15s,padding-left .15s}
.subnav a:hover{color:var(--accent);padding-left:4px}
.subnav a.active{color:var(--accent);font-weight:600}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px}
.card h3{font-weight:600;font-size:var(--h3);margin-bottom:9px}
.card p{color:var(--muted);font-size:.9rem}
/* метрика — только цифра и подпись, разделение воздухом */
.card.metric{background:none;border:none;border-radius:0;padding:0;text-align:left}
.card.metric .num{font-weight:700;font-size:2.2rem;line-height:1.1;letter-spacing:-.03em;color:var(--ink)}
.card.metric .lbl{font-weight:600;margin-top:5px;font-size:.95rem}
.card.metric .desc{color:var(--muted);font-size:.85rem;margin-top:6px}
.cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:20px}

.shot{border:1px solid var(--line);border-radius:14px;aspect-ratio:16/9;background:linear-gradient(135deg,#eef2fb,#f7f9fd);
  display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:.85rem;text-align:center;padding:20px}
.shots{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:20px}
.caption{color:var(--muted);font-size:.9rem;margin-top:10px}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:.85rem;color:var(--muted)}
.chip-tag{margin-left:auto;padding:3px 10px;font-size:.75rem;flex:0 0 auto}
.chip-btn{cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.chip-btn:hover{border-color:var(--accent);color:var(--accent)}
.chip-btn[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
.chip-life{border-color:var(--accent);color:var(--accent)}

#filters{margin-bottom:16px}
#filters:empty{display:none}
a.row .chip-tag + .row-arr{margin-left:10px}

.shell{display:flex;min-height:100vh}
.sidebar{
  view-transition-name:side-col;
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);position:sticky;top:0;align-self:flex-start;
  height:100vh;overflow-y:auto;padding:var(--pad);padding-right:clamp(48px,9vw,170px);
  display:flex;flex-direction:column;gap:24px;background:var(--bg);
}
.main{view-transition-name:main-col;flex:1 1 auto;min-width:0;padding:var(--pad);padding-left:clamp(32px,4vw,80px)}
.main-inner{max-width:820px}

.side-name{font-weight:700;font-size:var(--h1);line-height:1.15;letter-spacing:-.02em}
.side-role{margin-top:4px;color:var(--muted);font-weight:500;font-size:.95rem}
.avatar{width:64px;height:64px;border-radius:16px;flex:0 0 auto;background:linear-gradient(135deg,#dfe6ff,#eef1f7);
  display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent);font-size:18px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}


.side-bottom{margin-top:auto;display:flex;flex-direction:column;gap:18px}
.side-links{display:flex;flex-direction:column;gap:2px;font-size:1.02rem}
.side-links a{color:var(--accent);width:fit-content;transition:opacity .15s}
.side-links a:hover{opacity:.65}
.side-tabs{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.segmented{display:flex;gap:2px;background:var(--sel);padding:3px;border-radius:10px}
.segmented button{padding:6px 11px;border-radius:7px;font-weight:500;font-size:.8rem;color:var(--muted);white-space:nowrap;transition:background .18s,color .18s}
.segmented button[aria-pressed="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(20,20,25,.06)}
.lang{display:inline-flex;gap:2px;font-size:.8rem;font-weight:500;background:var(--sel);padding:3px;border-radius:10px}
.lang button{padding:6px 11px;border-radius:7px;color:var(--faint)}
.lang button[aria-pressed="true"]{color:var(--ink);background:var(--surface);box-shadow:0 1px 2px rgba(20,20,25,.06)}

.about-lead{font-weight:700;font-size:var(--h1);line-height:1.25;letter-spacing:-.02em}
.about-lead b{color:var(--accent)}
.about-body{margin-top:18px;color:var(--muted);max-width:56ch;font-size:1.02rem}
.section{margin-top:clamp(48px,7vh,80px)}
.section-head{font-weight:700;font-size:var(--h2);line-height:1.2;letter-spacing:-.01em;margin-bottom:20px}

.exp{padding:clamp(64px,10vh,110px) 0 0}
.exp:first-child{padding-top:0}
.exp-eyebrow{font-size:.8rem;color:var(--faint);font-variant-numeric:tabular-nums}
.exp-role{font-weight:700;font-size:var(--h2);line-height:1.2;margin-top:6px;letter-spacing:-.01em}
.exp-company{color:var(--accent)}
.exp-summary{margin-top:10px;color:var(--muted)}
.toggle{margin-top:16px;display:inline-flex;align-items:center;gap:8px;font-weight:500;font-size:.92rem}
.toggle .chev{transition:transform .2s;color:var(--faint)}
.toggle[aria-expanded="true"] .chev{transform:rotate(90deg)}
.duties{overflow:hidden;max-height:0;transition:max-height .3s ease}
.duties-inner{padding-top:14px}
.duties ul{list-style:none;display:flex;flex-direction:column;gap:9px;max-width:62ch}
.duties li{position:relative;padding-left:18px;color:var(--muted);font-size:.96rem}
.duties li::before{content:"";position:absolute;left:0;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--accent)}
/* пункт-подзаголовок (целиком жирный) — без маркера */
.duties li:has(> b:only-child){padding-left:0;color:var(--ink);font-weight:600;margin-top:10px}
.duties li:has(> b:only-child)::before{display:none}
.case-link{margin-top:10px;display:flex;width:fit-content;align-items:center;gap:7px;color:var(--accent);font-weight:500;font-size:.95rem}
.case-link .arr{transition:transform .18s}
.case-link:hover .arr{transform:translate(2px,-2px)}
.exp-media{margin-top:20px;border-radius:16px;aspect-ratio:16/10;overflow:hidden;display:flex;align-items:flex-end;padding:20px;border:1px solid var(--line);position:relative}
.exp-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.exp-media .cap{position:relative;font-weight:700;color:#fff;font-size:1.05rem;text-shadow:0 1px 12px rgba(0,0,0,.25)}
.exp-media .yrbig{position:absolute;top:16px;right:20px;font-weight:600;color:rgba(255,255,255,.85);font-size:.85rem}



.cv-view{display:none}
.cv-view.active{display:block}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-weight:500;font-size:.92rem;margin-bottom:28px}
.back:hover{color:var(--accent)}
.cv-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap}
.cv-title{font-weight:700;font-size:var(--h1);letter-spacing:-.02em}
.cv-sub{color:var(--muted);margin-top:6px}
.dl-btn{padding:11px 20px;background:var(--accent);color:#fff;border-radius:10px;font-weight:500;white-space:nowrap}
.cv-block{margin-top:32px}
.cv-block h3{font-size:var(--eyebrow);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
.cv-item{padding:12px 0;border-top:1px solid var(--line)}
.cv-item .r{font-weight:600}
.cv-item .m{color:var(--muted);font-size:.92rem}

/* work виден всегда; personal добавляется только в режиме Private */
[data-view="personal"]{display:none}
body[data-mode="life"] [data-view="personal"]{display:block}



.topbar{display:none}
@media (max-width:900px){
  .shell{flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;padding:14px var(--pad);background:var(--bg);border-bottom:1px solid var(--line)}
  .tb-name{font-weight:700}
  .burger{width:40px;height:40px;border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center}
  .burger span{width:18px;height:2px;background:var(--ink);border-radius:2px}
  .sidebar{position:fixed;inset:0 0 0 auto;width:min(88vw,340px);z-index:50;transform:translateX(100%);transition:transform .28s ease;box-shadow:-20px 0 60px rgba(20,20,25,.08)}
  body.nav-open .sidebar{transform:translateX(0)}
  .scrim{position:fixed;inset:0;background:rgba(20,20,25,.3);opacity:0;pointer-events:none;transition:.28s;z-index:45}
  body.nav-open .scrim{opacity:1;pointer-events:auto}
}
@media (min-width:901px){.scrim{display:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
@media print{.sidebar,.topbar,.scrim,.back,.dl-btn,#home{display:none!important}.cv-view{display:block!important}.main{padding:0}}
</style>

/* ============================================================
   ТИПОГРАФИКА: убираем висячие предлоги.
   Текст не меняется — только пробел после коротких слов
   становится неразрывным, чтобы они не висели в конце строки.
============================================================ */
const SHORT_WORDS = [
  // предлоги
  "в","во","на","за","к","ко","с","со","о","об","обо","от","ото","по","до","из","изо",
  "у","для","при","про","над","под","без","перед","через","между","около","среди","после",
  // союзы и частицы
  "и","а","но","ни","не","же","ли","бы","то","что","как","чтобы","или","либо","если","так",
  // местоимения
  "я","мы","он","она","оно","они","их","его","её","мой","моя","моё","наш","эта","это","этот","все","всё",
  // англ.
  "a","an","the","in","on","at","to","of","for","and","or","with","by","from","as","is","are","was","we","i","it","my","our"
];

function fixOrphans(root){
  if(!root) return;
  const re = new RegExp("(^|[\\s(«\"„—–-])(" + SHORT_WORDS.join("|") + ")\\s+", "gi");
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n=>{
    let t = n.nodeValue;
    if(!t || !t.trim()) return;
    // короткие слова склеиваем со следующим
    let prev;
    do { prev = t; t = t.replace(re, (m,a,w)=> a + w + "\u00A0"); } while(t !== prev);
    // тире не должно начинать строку
    t = t.replace(/\s+([—–])\s/g, "\u00A0$1 ");
    // разряды в числах не рвутся: 10 000
    t = t.replace(/(\d)\s(?=\d{3}\b)/g, "$1\u00A0");
    if(t !== n.nodeValue) n.nodeValue = t;
  });
}

  const edu=EDUCATION.map(e=>`<div class="cv-item"><div class="r">${e.ti[LANG]}</div><div class="m">${e.yr}</div></div>`).join("");
  $("#cv-body").innerHTML=`
    <div class="cv-block"><h3>${LANG==="ru"?"О себе":"About"}</h3><p style="color:var(--muted);max-width:60ch">${t("bio")}</p></div>
    <div class="cv-block"><h3>${t("expHead")}</h3>${exp}</div>
    <div class="cv-block"><h3>${t("eduHead")}</h3>${edu}</div>
    <div class="cv-block"><h3>${t("skillHead")}</h3>
      <p style="color:var(--muted)">${[...SKILLS.tools,...SKILLS.methods].join(" · ")}</p>
      <p style="color:var(--muted);margin-top:8px">${SKILLS.langs[LANG].join(" · ")}</p></div>`;
}
function renderAll(){fillI18n();renderProjects();renderExperience();renderEducation();renderSkills();renderPersonal();renderCV();fixOrphans(document.querySelector(".main"));fixOrphans(document.querySelector(".sidebar"));}

function setMode(m){
  document.body.setAttribute("data-mode",m);
  try{localStorage.setItem("mode",m)}catch(e){}
  document.querySelectorAll("[data-mode-btn]").forEach(b=>
    b.setAttribute("aria-pressed",String(b.getAttribute("data-mode-btn")===m)));
  FILTER="all";
  renderProjects();   // список зависит от режима
  renderSkills();     // навыки тоже
}
function setLang(l){
  LANG=l; document.documentElement.lang=l;
  document.querySelectorAll("[data-lang-btn]").forEach(b=>
    b.setAttribute("aria-pressed",String(b.getAttribute("data-lang-btn")===l)));
  try{localStorage.setItem("lang",l)}catch(e){}
  renderAll();
}
document.querySelectorAll("[data-mode-btn]").forEach(b=>
  b.addEventListener("click",()=>setMode(b.getAttribute("data-mode-btn"))));
document.querySelectorAll("[data-lang-btn]").forEach(b=>
  b.addEventListener("click",()=>setLang(b.getAttribute("data-lang-btn"))));

function route(){
  const cv=location.hash.startsWith("#cv");
  $("#cv-view").classList.toggle("active",cv);
  $("#home").style.display=cv?"none":"block";
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

$("#burger").addEventListener("click",()=>document.body.classList.toggle("nav-open"));
$("#scrim").addEventListener("click",()=>document.body.classList.remove("nav-open"));
$("#sidebar").addEventListener("click",e=>{if(e.target.closest("a"))document.body.classList.remove("nav-open")});

setLang(LANG);
setMode((()=>{try{return localStorage.getItem("mode")||"work"}catch(e){return "work"}})());
route();
</script>
</body>
</html>
